name: Read Labels

on:
    workflow_run:
        workflows: ["Detect Labels"]
        types: [completed]

jobs:
    read-label-data:
        if: >
            github.event.workflow_run.event == 'pull_request' &&
            github.event.workflow_run.conclusion == 'success'
        runs-on: ubuntu-latest
        steps:
            - name: "Download artifact"
              uses: actions/github-script@v8
              with:
                  script: |
                      let allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        run_id: context.payload.workflow_run.id,
                      });
                      let matchArtifact = allArtifacts.data.artifacts.filter((artifact) => {
                        return artifact.name == "pr-data"
                      })[0];
                      let download = await github.rest.actions.downloadArtifact({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        artifact_id: matchArtifact.id,
                        archive_format: 'zip',
                      });
                      const fs = require('fs');
                      const path = require('path');
                      const temp = '${{ runner.temp }}/artifacts';
                      if (!fs.existsSync(temp)){
                        fs.mkdirSync(temp);
                      }
                      fs.writeFileSync(path.join(temp, 'pr-data.zip'), Buffer.from(download.data));

            - name: "Unzip artifact"
              run: unzip "${{ runner.temp }}/artifacts/pr-data.zip" -d "${{ runner.temp }}/artifacts"

            - name: "Comment on PR"
              uses: actions/github-script@v8
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      const fs = require('fs');
                      const path = require('path');
                      const temp = '${{ runner.temp }}/artifacts';
                      const issue_number = Number(fs.readFileSync(path.join(temp, 'NR')));
                      const label = fs.readFileSync(path.join(temp, 'LABEL')).toString().trim();
                      await github.rest.issues.createComment({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        issue_number: issue_number,
                        body: 'This comment has been added by adding the ' + label + ' label to PR: ' + issue_number
                      });
